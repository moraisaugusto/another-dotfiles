# prompt chars
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold bright-red)"
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_replace_one_symbol = "[ÔØ«](bold yellow)"
vimcmd_replace_symbol = "[ÔØ«](bold yellow)"
vimcmd_visual_symbol = "[ÔØ«](bold cyan)"

[directory]
style = "fg:black bg:blue"
truncate_to_repo = true
truncation_length = 1
truncation_symbol = "../"
read_only = ' ´Çú '
read_only_style = 'bright-red'
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
style = "fg:black bg:yellow"
symbol = "[ ¾░èó ](fg:black bg:yellow)"
format = '[$symbol$branch(:$remote_branch) ]($style)'

[git_commit]
only_detached = true
tag_symbol = "/"
tag_disabled = false
format = "[ÒÇî¾░èó $hash$tag ](black)"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
conflicted = '¯¼║$count'
deleted = "´Çì "
diverged = 'Ôåæ$ahead_countÔåô$behind_count'
modified = "¾▒ç¼ "
renamed = "´üí "
staged = "¾░ØÆ "
stashed = "¾░¼▓ "
untracked = "´ä¿ "
format = "[$all_status$ahead_behind](fg:black bg:yellow)"

[git_metrics]
disabled = false
format = '(yellow)'

[cmd_duration]
format = ' took [$duration](white) '

